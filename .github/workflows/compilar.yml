name: Build TWA APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA project
        run: |
          bubblewrap init \
            --manifest=https://drison28.github.io/DrisonBike-/manifest.json \
            --directory=twa-app \
            --skipPwaValidation \
            --installDeps

      - name: Build APK
        working-directory: twa-app
        run: bubblewrap build --skipSigning

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: drison-bike-twa
          path: twa-app/app-release-unsigned.apk
