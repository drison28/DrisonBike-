name: Build TWA APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Clone TWA starter
        run: git clone https://github.com/GoogleChromeLabs/svgomg-twa.git twa-app
      - name: Configure TWA
        run: |
          cd twa-app
          sed -i 's|svgomg.firebaseapp.com|drison28.github.io|g' app/src/main/res/values/strings.xml
          sed -i 's|https://svgomg.firebaseapp.com|https://drison28.github.io/DrisonBike-/|g' app/src/main/res/values/strings.xml
      - name: Build APK
        run: |
          cd twa-app
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: drison-bike-twa
          path: twa-app/app/build/outputs/apk/debug/app-debug.apk
