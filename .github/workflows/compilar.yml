name: Build TWA APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Init TWA
        env:
          BUBBLEWRAP_SKIP_UPDATE: true
        run: |
          bubblewrap init \
            --manifest https://drison28.github.io/DrisonBike-/manifest.json \
            --directory twa-app \
            --skipPwaValidation \
            --installDeps \
            --packageId com.drison.bike \
            --name "Drison Bike"
      - name: Build APK
        run: |
          cd twa-app
          bubblewrap build --skipSigning
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: drison-bike-apk
          path: twa-app/app-release-unsigned.apk
